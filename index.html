<!DOCTYPE html>
<html lang="ur">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aehsan Mart Store</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      text-align: center;
    }
    header {
      background: #0f172a;
      color: white;
      padding: 25px;
    }
    .container {
      padding: 40px 20px;
    }
    .card {
      background: white;
      max-width: 380px;
      margin: auto;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }
    .card img {
      width: 100%;
      border-radius: 15px;
    }
    .price {
      color: green;
      font-size: 28px;
      font-weight: bold;
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      background: green;
      color: white;
      padding: 14px 25px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 18px;
    }
    footer {
      margin-top: 40px;
      background: #111827;
      color: white;
      padding: 15px;
    }
  </style>
</head>
<body>

<header>
  <h1>Aehsan Mart Store</h1>
  <p>خالص ہلدی اور نیچرل مصنوعات</p>
</header>

<div class="container">
  <div class="card">
    <img src="https://images.unsplash.com/photo-1615485290382-441e4d049cb5?q=80&w=800&auto=format&fit=crop" alt="Haldi" />
    <h2>پریمیم ہلدی</h2>
    <p>اعلیٰ معیار کی خالص ہلدی اب آن لائن دستیاب</p>
    <div class="price">Rs. 999</div>

    <a class="btn" href="https://wa.me/923224111203">
      WhatsApp پر آرڈر کریں
    </a>
  </div>
</div>

<footer>
  © 2026 Aehsan Mart Store
</footer>

</body>
</html>
